openapi: 3.1.0
info:
  title: P2P Planner Backend API
  version: 0.2.0
  description: 'HTTP API v1 для web-first local-first Kanban planner с sync-ready
    foundation. Контракт выровнен с MVP scope: workspace / board / column / card плюс
    labels, checklists, comments, минимальная коллаборация, session/device/replica-aware
    auth.

    '
servers:
- url: /api/v1
tags:
- name: auth
- name: users
- name: appearance
- name: activity
- name: audit
- name: workspaces
- name: boards
- name: cards
- name: labels
- name: checklists
- name: comments
- name: sync
- name: integrations
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Короткоживущий access token для обычных защищенных вызовов API.

        '
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: 'HttpOnly refresh token cookie для обновления сессии и завершения
        текущего сеанса.

        '
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      description: UUIDv7 workspace
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      description: UUIDv7 membership record
      schema:
        type: string
        format: uuid
    BoardId:
      name: boardId
      in: path
      required: true
      description: UUIDv7 board
      schema:
        type: string
        format: uuid
    ColumnId:
      name: columnId
      in: path
      required: true
      description: UUIDv7 column
      schema:
        type: string
        format: uuid
    CardId:
      name: cardId
      in: path
      required: true
      description: UUIDv7 card
      schema:
        type: string
        format: uuid
    LabelId:
      name: labelId
      in: path
      required: true
      description: UUIDv7 label
      schema:
        type: string
        format: uuid
    ChecklistId:
      name: checklistId
      in: path
      required: true
      description: UUIDv7 checklist
      schema:
        type: string
        format: uuid
    ChecklistItemId:
      name: itemId
      in: path
      required: true
      description: UUIDv7 checklist item
      schema:
        type: string
        format: uuid
    CommentId:
      name: commentId
      in: path
      required: true
      description: UUIDv7 comment
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: UUIDv7 device
      schema:
        type: string
        format: uuid
    ProviderKey:
      name: providerKey
      in: path
      required: true
      description: Integration provider key
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: 'Максимум элементов в ответе. Если параметр не передан, backend
        использует дефолт.

        '
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor for cursor-based pagination.
      schema:
        type:
        - string
        - 'null'
    Archived:
      name: archived
      in: query
      required: false
      description: 'Фильтр по архивности. false = только активные, true = только архивные,
        null = обе группы.

        '
      schema:
        type:
        - boolean
        - 'null'
    SearchQuery:
      name: q
      in: query
      required: false
      description: Free-text search query.
      schema:
        type:
        - string
        - 'null'
    ActivityKinds:
      name: kinds
      in: query
      required: false
      description: Optional repeated filter for activity event kinds.
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
    ActorUserId:
      name: actorUserId
      in: query
      required: false
      schema:
        type:
        - string
        - 'null'
        format: uuid
    ActionType:
      name: actionType
      in: query
      required: false
      schema:
        type:
        - string
        - 'null'
    TargetEntityType:
      name: targetEntityType
      in: query
      required: false
      schema:
        type:
        - string
        - 'null'
    TargetEntityId:
      name: targetEntityId
      in: query
      required: false
      schema:
        type:
        - string
        - 'null'
        format: uuid
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but lacks required access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict or duplicate operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Semantic validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Route is mounted but deferred/not implemented in the current beta
        slice
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    PageInfo:
      type: object
      required:
      - hasNextPage
      - nextCursor
      properties:
        hasNextPage:
          type: boolean
        nextCursor:
          type:
          - string
          - 'null'
    ErrorDetail:
      type: object
      required:
      - field
      - code
      - message
      properties:
        field:
          type:
          - string
          - 'null'
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - details
          properties:
            code:
              type: string
              examples:
              - bad_request
              - unauthorized
              - forbidden
              - not_found
              - conflict
              - not_implemented
              - internal_error
            message:
              type: string
            details:
              type:
              - object
              - array
              - string
              - number
              - boolean
              - 'null'
              additionalProperties: true
    User:
      type: object
      required:
      - id
      - email
      - displayName
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
    Device:
      type: object
      required:
      - id
      - displayName
      - platform
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        platform:
          type: string
    Session:
      type: object
      required:
      - id
      - userId
      - status
      - createdAt
      - expiresAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        deviceId:
          type:
          - string
          - 'null'
          format: uuid
        replicaId:
          type:
          - string
          - 'null'
          format: uuid
        status:
          type: string
          enum:
          - active
          - revoked
          - expired
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type:
          - string
          - 'null'
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type:
          - string
          - 'null'
          format: date-time
    AuthTokens:
      type: object
      required:
      - accessToken
      - tokenType
      - expiresAt
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum:
          - Bearer
        expiresAt:
          type: string
          format: date-time
    CurrentSessionResponse:
      type: object
      required:
      - user
      - session
      properties:
        user:
          $ref: '#/components/schemas/User'
        session:
          $ref: '#/components/schemas/Session'
        device:
          oneOf:
          - $ref: '#/components/schemas/Device'
          - type: 'null'
        replica:
          oneOf:
          - $ref: '#/components/schemas/Replica'
          - type: 'null'
    SignUpRequest:
      type: object
      required:
      - email
      - password
      - displayName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        device:
          oneOf:
          - $ref: '#/components/schemas/UpsertDeviceRequest'
          - type: 'null'
    SignInRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        device:
          oneOf:
          - $ref: '#/components/schemas/UpsertDeviceRequest'
          - type: 'null'
    DevBootstrapUserRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
    DevBootstrapUserResponse:
      type: object
      required:
      - id
      - email
      - displayName
      - mode
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        mode:
          type: string
          enum:
          - dev_header
    SignInResponse:
      type: object
      required:
      - user
      - session
      - tokens
      properties:
        user:
          $ref: '#/components/schemas/User'
        session:
          $ref: '#/components/schemas/Session'
        device:
          oneOf:
          - $ref: '#/components/schemas/Device'
          - type: 'null'
        tokens:
          $ref: '#/components/schemas/AuthTokens'
    RefreshSessionRequest:
      type: object
      properties:
        device:
          oneOf:
          - $ref: '#/components/schemas/UpsertDeviceRequest'
          - type: 'null'
    RefreshSessionResponse:
      type: object
      required:
      - session
      - tokens
      properties:
        session:
          $ref: '#/components/schemas/Session'
        device:
          oneOf:
          - $ref: '#/components/schemas/Device'
          - type: 'null'
        tokens:
          $ref: '#/components/schemas/AuthTokens'
    UpsertDeviceRequest:
      type: object
      required:
      - platform
      properties:
        platform:
          type: string
          enum:
          - web
          - desktop
          - android
          - ios
          - server
        clientDeviceId:
          type:
          - string
          - 'null'
        label:
          type:
          - string
          - 'null'
        appVersion:
          type:
          - string
          - 'null'
        userAgent:
          type:
          - string
          - 'null'
    UpdateMeRequest:
      type: object
      additionalProperties: false
      properties:
        displayName:
          type:
          - string
          - 'null'
        username:
          type:
          - string
          - 'null'
        avatarUrl:
          type:
          - string
          - 'null'
          format: uri
    Workspace:
      type: object
      required:
      - id
      - name
      - visibility
      - ownerUserId
      - createdAt
      - updatedAt
      - isArchived
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        visibility:
          type: string
          enum:
          - private
          - shared
        ownerUserId:
          type: string
          format: uuid
        memberCount:
          type: integer
          minimum: 0
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type:
          - string
          - 'null'
          format: date-time
    WorkspaceMember:
      type: object
      required:
      - id
      - workspaceId
      - userId
      - role
      - status
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum:
          - owner
          - admin
          - member
        status:
          type: string
          enum:
          - active
          - removed
        invitedByUserId:
          type:
          - string
          - 'null'
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        removedAt:
          type:
          - string
          - 'null'
          format: date-time
    WorkspaceWithMembers:
      allOf:
      - $ref: '#/components/schemas/Workspace'
      - type: object
        properties:
          currentUserRole:
            type:
            - string
            - 'null'
            enum:
            - owner
            - admin
            - member
            - null
          members:
            type: array
            items:
              $ref: '#/components/schemas/WorkspaceMember'
    WorkspaceListResponse:
      type: object
      required:
      - items
      - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    WorkspaceMembersListResponse:
      type: object
      required:
      - items
      - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMember'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    CreateWorkspaceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        visibility:
          type: string
          enum:
          - private
          - shared
          default: private
    UpdateWorkspaceRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type:
          - string
          - 'null'
        slug:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        visibility:
          type:
          - string
          - 'null'
          enum:
          - private
          - shared
          - null
    AddWorkspaceMemberRequest:
      type: object
      required:
      - userId
      - role
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum:
          - admin
          - member
    UpdateWorkspaceMemberRequest:
      type: object
      additionalProperties: false
      properties:
        role:
          type:
          - string
          - 'null'
          enum:
          - admin
          - member
          - null
    Board:
      type: object
      required:
      - id
      - workspaceId
      - name
      - boardType
      - isArchived
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
          - string
          - 'null'
        boardType:
          type: string
          enum:
          - kanban
        isArchived:
          type: boolean
        labelIds:
          type: array
          items:
            type: string
            format: uuid
        checklistCount:
          type: integer
          minimum: 0
        checklistCompletedItemCount:
          type: integer
          minimum: 0
        commentCount:
          type: integer
          minimum: 0
        createdByUserId:
          type:
          - string
          - 'null'
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type:
          - string
          - 'null'
          format: date-time
    BoardListResponse:
      type: object
      required:
      - items
      - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Board'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    CreateBoardRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type:
          - string
          - 'null'
        boardType:
          type: string
          enum:
          - kanban
          default: kanban
    UpdateBoardRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
    BoardColumn:
      type: object
      required:
      - id
      - boardId
      - name
      - position
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
          - string
          - 'null'
        position:
          type: number
        colorToken:
          type:
          - string
          - 'null'
        wipLimit:
          type:
          - integer
          - 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ColumnListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BoardColumn'
    CreateColumnRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type:
          - string
          - 'null'
        position:
          type:
          - number
          - 'null'
        colorToken:
          type:
          - string
          - 'null'
        wipLimit:
          type:
          - integer
          - 'null'
    UpdateColumnRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        position:
          type:
          - number
          - 'null'
        colorToken:
          type:
          - string
          - 'null'
        wipLimit:
          type:
          - integer
          - 'null'
    ReorderColumnsRequest:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - columnId
            - position
            properties:
              columnId:
                type: string
                format: uuid
              position:
                type: number
    Card:
      type: object
      required:
      - id
      - boardId
      - columnId
      - title
      - position
      - isArchived
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        columnId:
          type: string
          format: uuid
        parentCardId:
          type:
          - string
          - 'null'
          format: uuid
        title:
          type: string
        description:
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
          enum:
          - todo
          - in_progress
          - blocked
          - done
          - null
        priority:
          type:
          - string
          - 'null'
          enum:
          - low
          - medium
          - high
          - urgent
          - null
        position:
          type: number
        startAt:
          type:
          - string
          - 'null'
          format: date-time
        dueAt:
          type:
          - string
          - 'null'
          format: date-time
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        isArchived:
          type: boolean
        labelIds:
          type: array
          items:
            type: string
            format: uuid
        checklistCount:
          type: integer
          minimum: 0
        checklistCompletedItemCount:
          type: integer
          minimum: 0
        commentCount:
          type: integer
          minimum: 0
        createdByUserId:
          type:
          - string
          - 'null'
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type:
          - string
          - 'null'
          format: date-time
    CardListResponse:
      type: object
      required:
      - items
      - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    CreateCardRequest:
      type: object
      required:
      - title
      - columnId
      properties:
        title:
          type: string
        description:
          type:
          - string
          - 'null'
        columnId:
          type: string
          format: uuid
        parentCardId:
          type:
          - string
          - 'null'
          format: uuid
        position:
          type:
          - number
          - 'null'
        status:
          type:
          - string
          - 'null'
          enum:
          - todo
          - in_progress
          - blocked
          - done
          - null
        priority:
          type:
          - string
          - 'null'
          enum:
          - low
          - medium
          - high
          - urgent
          - null
        startAt:
          type:
          - string
          - 'null'
          format: date-time
        dueAt:
          type:
          - string
          - 'null'
          format: date-time
    UpdateCardRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type:
          - string
          - 'null'
        description:
          type:
          - string
          - 'null'
        columnId:
          type:
          - string
          - 'null'
          format: uuid
        parentCardId:
          type:
          - string
          - 'null'
          format: uuid
        status:
          type:
          - string
          - 'null'
          enum:
          - todo
          - in_progress
          - blocked
          - done
          - null
        priority:
          type:
          - string
          - 'null'
          enum:
          - low
          - medium
          - high
          - urgent
          - null
        position:
          type:
          - number
          - 'null'
        startAt:
          type:
          - string
          - 'null'
          format: date-time
        dueAt:
          type:
          - string
          - 'null'
          format: date-time
        completedAt:
          type:
          - string
          - 'null'
          format: date-time
        isArchived:
          type:
          - boolean
          - 'null'
    MoveCardRequest:
      type: object
      required:
      - targetColumnId
      properties:
        targetColumnId:
          type: string
          format: uuid
        position:
          type:
          - number
          - 'null'
    ReorderColumnCardsRequest:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - cardId
            - position
            properties:
              cardId:
                type: string
                format: uuid
              position:
                type: number
    BoardLabel:
      type: object
      required:
      - id
      - boardId
      - name
      - color
      - createdAt
      - updatedAt
      properties:
        id:
