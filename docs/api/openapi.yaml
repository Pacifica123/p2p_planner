paths:
  /auth/sign-up:
    post:
      tags:
      - auth
      summary: Create user account and start initial session
      description: 'Endpoint optional at deployment level. Self-hosted instances may
        disable public sign-up.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Signed up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
      x-v1Status: real_v1
      x-frontendUsed: true
  /auth/sign-in:
    post:
      tags:
      - auth
      summary: Sign in with email/password and start or continue a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
      x-v1Status: real_v1
      x-frontendUsed: true
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Rotate refresh token and issue a new access token
      security:
      - refreshTokenCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshSessionRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
      x-v1Status: real_v1
      x-frontendUsed: true
  /auth/sign-out:
    post:
      tags:
      - auth
      summary: Revoke current session
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignOutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
      x-v1Status: real_v1
      x-frontendUsed: true
  /auth/sign-out-all:
    post:
      tags:
