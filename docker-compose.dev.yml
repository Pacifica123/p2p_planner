services:
  postgres:
    image: postgres:16-alpine
    container_name: p2p-planner-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: p2p_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - p2p_planner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d p2p_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  p2p_planner_postgres_data:
